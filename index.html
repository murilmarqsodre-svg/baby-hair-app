<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Hair - Agendamento</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; background:#0a0a0a; color:white; padding:20px; }
input, select, button { width:100%; padding:12px; margin-bottom:10px; border-radius:10px; border:none; }
button { background:#e19d9d; color:white; font-weight:bold; }
</style>
</head>

<body>

<h2>Agendar</h2>

<input type="text" id="nome" placeholder="Nome">
<input type="text" id="sobrenome" placeholder="Sobrenome">
<input type="text" id="contato" placeholder="WhatsApp">

<input type="date" id="data">
<input type="time" id="hora">

<select id="pagamento">
<option value="Dinheiro">Dinheiro</option>
<option value="Pix">Pix</option>
<option value="Cartão">Cartão</option>
</select>

<input type="number" id="valor" placeholder="Valor do serviço">

<button onclick="agendar()">Finalizar Agendamento</button>

<script>

// 🔥 CONEXÃO
const supabaseClient = supabase.createClient(
'https://htraketscvmlaecbvdum.supabase.co',
'sb_publishable_kpTujdxJLja9w0YrfVHqkg_o2VrRgzy'
);

// 🚀 FUNÇÃO PRINCIPAL
async function agendar() {

const nome = document.getElementById('nome').value;
const sobrenome = document.getElementById('sobrenome').value;
const contato = document.getElementById('contato').value;

const data = document.getElementById('data').value;
const hora = document.getElementById('hora').value;

const pagamento = document.getElementById('pagamento').value;

// 🔥 VALORES
const valorNumero = parseFloat(document.getElementById('valor').value || 0);
const valorTexto = `R$ ${valorNumero.toFixed(2)}`;

// 🔥 INSERT COMPLETO
const { error } = await supabaseClient
.from('lista_agendamentos')
.insert([{
    cliente_nome: nome,
    cliente_sobrenome: sobrenome,
    contato: contato,
    data_agendamento: data,
    horario_agendamento: hora,
    forma_pagamento: pagamento,
    valor_total: valorTexto,
    valor_total_num: valorNumero
}]);

if (error) {
    alert("Erro ao agendar!");
    console.error(error);
    return;
}

alert("Agendamento realizado com sucesso!");
location.reload();
}

</script>

</body>
</html>
