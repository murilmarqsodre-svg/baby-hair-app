<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Hair App</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col items-center p-4">

    <div class="bg-white p-6 rounded-2xl shadow-lg w-full max-w-md">
        <h1 class="text-2xl font-bold text-center mb-6 text-gray-800">Agendamento Baby Hair</h1>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Nome</label>
                <input type="text" id="cliente_nome" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Digite seu nome">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Sobrenome</label>
                <input type="text" id="cliente_sobrenome" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Digite seu sobrenome">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">WhatsApp</label>
                <input type="text" id="contato" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="(00) 00000-0000">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Serviço</label>
                <select id="servico" class="w-full p-3 border rounded-lg bg-white" onchange="atualizarValor()">
                    <option value="">Selecione um serviço</option>
                    <option value="Corte Simples" data-preco="30.00">Corte Simples - R$ 30,00</option>
                    <option value="Corte + Barba" data-preco="50.00">Corte + Barba - R$ 50,00</option>
                    <option value="Pezinho" data-preco="15.00">Pezinho - R$ 15,00</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Valor</label>
                <input type="text" id="valor" class="w-full p-3 border rounded-lg bg-gray-50 font-bold text-blue-600" readonly placeholder="R$ 0,00">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Forma de Pagamento</label>
                <select id="pagamento" class="w-full p-3 border rounded-lg bg-white">
                    <option value="Dinheiro">Dinheiro</option>
                    <option value="Pix">Pix</option>
                    <option value="Cartão">Cartão</option>
                </select>
            </div>

            <button onclick="salvarAgendamento()" id="btnConfirmar" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold hover:bg-blue-700 transition duration-300">
                Confirmar Agendamento
            </button>

            <p id="mensagem" class="text-center mt-4 hidden"></p>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO DO SUPABASE (DADOS INSERIDOS CONFORME SOLICITADO)
        const SUPABASE_URL = 'https://oivvshvlyvzkfclzpxgx.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9pdnZzaHZseXZ6a2ZjbHpweGd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTI2NjM5NDMsImV4cCI6MjAyODI0Mzk0M30.4M3NfX08_5pM8J3Y5P9vX0a8Y2e4';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function atualizarValor() {
            const select = document.getElementById('servico');
            const valorInput = document.getElementById('valor');
            const preco = select.options[select.selectedIndex].getAttribute('data-preco');
            
            if (preco) {
                valorInput.value = `R$ ${preco.replace('.', ',')}`;
                valorInput.setAttribute('data-raw', preco);
            } else {
                valorInput.value = 'R$ 0,00';
            }
        }

        async function salvarAgendamento() {
            const btn = document.getElementById('btnConfirmar');
            const msg = document.getElementById('mensagem');

            const dados = {
                cliente_nome: document.getElementById('cliente_nome').value,
                cliente_sobrenome: document.getElementById('cliente_sobrenome').value,
                contato: document.getElementById('contato').value,
                servico: document.getElementById('servico').value,
                valor: parseFloat(document.getElementById('valor').getAttribute('data-raw') || 0),
                pagamento: document.getElementById('pagamento').value
            };

            if (!dados.cliente_nome || !dados.servico) {
                alert("Por favor, preencha o nome e o serviço.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Processando...";

            const { data, error } = await supabase
                .from('lista_agendamentos')
                .insert([dados]);

            if (error) {
                console.error('Erro:', error);
                msg.innerText = "Erro ao agendar: " + error.message;
                msg.className = "text-center mt-4 text-red-600 font-bold";
            } else {
                msg.innerText = "✅ Agendamento realizado com sucesso!";
                msg.className = "text-center mt-4 text-green-600 font-bold";
                // Limpar campos
                document.querySelectorAll('input').forEach(i => i.value = "");
                document.getElementById('servico').value = "";
                document.getElementById('valor').value = "R$ 0,00";
            }
            
            msg.classList.remove('hidden');
            btn.disabled = false;
            btn.innerText = "Confirmar Agendamento";
        }
    </script>
</body>
</html>
