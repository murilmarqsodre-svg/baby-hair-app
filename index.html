<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Hair - Agendar</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --accent: #e19d9d; --bg: #0a0a0a; --card: #161616; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        .header { text-align: center; margin: 30px 0; }
        .header h1 { color: var(--accent); letter-spacing: 4px; font-weight: 300; }
        .service-card { background: var(--card); border: 1px solid #222; border-radius: 20px; padding: 20px; margin-bottom: 15px; width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; }
        .btn-book { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header"><h1>BABY HAIR</h1><p>Agendamento Exclusivo</p></div>
    <div id="lista" style="width: 100%; max-width: 400px;">Carregando...</div>

<script>
    const _supabase = supabase.createClient('https://htraketscvmlaecbvdum.supabase.co', 'sb_publishable_kpTujdxJLja9w0YrfVHqkg_o2VrRgzy');
    const urlParams = new URLSearchParams(window.location.search);
    const SALAO_ID = urlParams.get('salao') || 1;

    async function load() {
        const { data } = await _supabase.from('servicos_cadastrados').select('*').eq('admin_id', SALAO_ID);
        const container = document.getElementById('lista');
        container.innerHTML = "";
        data.forEach(s => {
            container.innerHTML += `
                <div class="service-card">
                    <div><strong>${s.nome}</strong><br><span style="color:var(--accent)">R$ ${s.preco.toFixed(2)}</span></div>
                    <button class="btn-book" onclick="book('${s.nome}', ${s.preco})">Agendar</button>
                </div>`;
        });
    }

    async function book(n, p) {
        const cliente = prompt("Seu nome:");
        if(!cliente) return;
        const { error } = await _supabase.from('agendamentos').insert([{ nome: cliente, servico: n, preco: p, salao_id: SALAO_ID }]);
        if(!error) alert("Agendado com sucesso!");
        else alert("Erro: " + error.message);
    }
    load();
</script>
</body>
</html>
