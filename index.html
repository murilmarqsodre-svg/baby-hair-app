<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Hair - Agendamento</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --accent: #e19d9d; --bg: #0a0a0a; --card: #161616; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-weight: 300; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; margin: 0; }
        .container { width: 100%; max-width: 450px; }
        .input-group { margin-bottom: 12px; }
        input, select { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #222; background: #000; color: #fff; box-sizing: border-box; font-size: 16px; outline: none; }
        .section-title { color: var(--accent); font-size: 11px; text-transform: uppercase; letter-spacing: 2px; margin: 25px 0 12px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .service-card { background: var(--card); border: 1px solid #222; border-radius: 20px; padding: 18px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .service-card.active { border-color: var(--accent); background: #1f1f1f; }
        .carousel { display: flex; overflow-x: auto; gap: 15px; padding: 10px 5px 20px; scrollbar-width: none; width: 100%; }
        .carousel::-webkit-scrollbar { display: none; }
        .product-card { min-width: 150px; background: var(--card); border-radius: 20px; padding: 12px; border: 1px solid #222; text-align: center; }
        .product-card img { width: 100%; height: 120px; border-radius: 15px; object-fit: cover; margin-bottom: 8px; }
        .btn-confirm { background: var(--accent); color: white; border: none; padding: 20px; border-radius: 18px; width: 100%; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="header"><h1>BABY HAIR</h1><p>Agendamento Premium</p></div>
    <div class="container">
        <input type="text" id="nome_cli" placeholder="Seu Nome" style="margin-bottom:10px">
        <input type="tel" id="zap_cli" placeholder="WhatsApp">

        <div class="section-title">Serviço</div>
        <div id="lista-servicos"></div>

        <div class="section-title">Profissional</div>
        <select id="select-prof">
            <option value="">Selecione o serviço primeiro</option>
        </select>

        <div class="section-title">Data e Horário</div>
        <div style="display: flex; gap: 10px;">
            <input type="date" id="data_agend">
            <select id="hora_agend"><option value="">Selecione a data</option></select>
        </div>

        <div class="section-title">Mimos & Produtos</div>
        <div class="carousel" id="lista-produtos"></div>

        <button class="btn-confirm" onclick="finalizar()">CONFIRMAR AGENDAMENTO</button>
    </div>

<script>
    const _supabase = supabase.createClient('https://htraketscvmlaecbvdum.supabase.co', 'sb_publishable_kpTujdxJLja9w0YrfVHqkg_o2VrRgzy');
    const urlParams = new URLSearchParams(window.location.search);
    const SALAO_ID = urlParams.get('salao') || 1;
    let svcSel = null;

    async function init() {
        const { data: svcs } = await _supabase.from('servicos_cadastrados').select('*').eq('admin_id', SALAO_ID);
        const sDiv = document.getElementById('lista-servicos');
        svcs?.forEach(s => {
            const div = document.createElement('div');
            div.className = 'service-card';
            div.onclick = () => {
                document.querySelectorAll('.service-card').forEach(c => c.classList.remove('active'));
                div.classList.add('active');
                svcSel = s;
                atualizarProfissionais(s.nome);
            };
            div.innerHTML = `<div><strong>${s.nome}</strong><br><span style="color:var(--accent)">R$ ${s.preco.toFixed(2)}</span></div>`;
            sDiv.appendChild(div);
        });

        const { data: prods } = await _supabase.from('produtos_cadastrados').select('*').eq('admin_id', SALAO_ID);
        const pDiv = document.getElementById('lista-produtos');
        prods?.forEach(p => {
            pDiv.innerHTML += `<div class="product-card"><img src="${p.imagem_url || 'https://via.placeholder.com/150'}"><h4>${p.nome}</h4><span>R$ ${p.preco.toFixed(2)}</span></div>`;
        });
    }

    async function atualizarProfissionais(servicoNome) {
        const { data } = await _supabase.from('profissionais_servicos').select('profissional_nome').eq('servico_nome', servicoNome).eq('salao_id', SALAO_ID);
        const sel = document.getElementById('select-prof');
        sel.innerHTML = '<option value="">Escolha o profissional</option>';
        data?.forEach(p => sel.innerHTML += `<option value="${p.profissional_nome}">${p.profissional_nome}</option>`);
    }

    document.getElementById('data_agend').onchange = async (e) => {
        const prof = document.getElementById('select-prof').value;
        const { data: ocupados } = await _supabase.from('agendamentos').select('data_hora').eq('profissional', prof).filter('data_hora', 'gte', e.target.value + ' 00:00').filter('data_hora', 'lte', e.target.value + ' 23:59');
        const horasOcupadas = ocupados.map(o => o.data_hora.split(' ')[1].substring(0,5));
        const selHora = document.getElementById('hora_agend');
        selHora.innerHTML = '';
        ['08:00', '09:00', '10:00', '11:00', '13:00', '14:00', '15:00', '16:00', '17:00', '18:00'].forEach(h => {
            if(!horasOcupadas.includes(h)) selHora.innerHTML += `<option value="${h}">${h}</option>`;
        });
    };

    async function finalizar() {
        const nome = document.getElementById('nome_cli').value;
        const zap = document.getElementById('zap_cli').value;
        const prof = document.getElementById('select-prof').value;
        const data = document.getElementById('data_agend').value;
        const hora = document.getElementById('hora_agend').value;
        if(!nome || !svcSel || !prof || !data || !hora) return alert("Preencha todos os campos!");

        const { error } = await _supabase.from('agendamentos').insert([{
            nome, whatsapp: zap, servico: svcSel.nome, preco: svcSel.preco, profissional: prof, data_hora: `${data} ${hora}`, salao_id: SALAO_ID
        }]);
        if(!error) { alert("Agendado com sucesso!"); location.reload(); }
        else alert("Erro: " + error.message);
    }
    init();
</script>
</body>
</html>
