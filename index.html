<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Hair App</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* REVERTIDO PARA O SEU LAYOUT ORIGINAL */
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; pading: 20px; border-radius: 10px; shadow: 0 0 10px rgba(0,0,0,0.1); width: 300px; padding: 20px; }
        h1 { text-align: center; color: #333; }
        label { display: block; margin-top: 10px; color: #666; }
        input, select, button { width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background-color: #28a745; color: white; border: none; cursor: pointer; margin-top: 20px; font-weight: bold; }
        button:hover { background-color: #218838; }
        #mensagem { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Baby Hair App</h1>

        <label>Nome</label>
        <input type="text" id="cliente_nome" placeholder="Seu nome">

        <label>Sobrenome</label>
        <input type="text" id="cliente_sobrenome" placeholder="Seu sobrenome">

        <label>WhatsApp</label>
        <input type="text" id="contato" placeholder="(00) 00000-0000">

        <label>Serviço</label>
        <select id="servico" onchange="atualizarValor()">
            <option value="">Selecione...</option>
            <option value="Corte Simples" data-preco="30.00">Corte Simples - R$ 30,00</option>
            <option value="Corte + Barba" data-preco="50.00">Corte + Barba - R$ 50,00</option>
            <option value="Pezinho" data-preco="15.00">Pezinho - R$ 15,00</option>
        </select>

        <label>Valor</label>
        <input type="text" id="valor" readonly placeholder="R$ 0,00">

        <label>Pagamento</label>
        <select id="pagamento">
            <option value="Dinheiro">Dinheiro</option>
            <option value="Pix">Pix</option>
            <option value="Cartão">Cartão</option>
        </select>

        <button onclick="salvarAgendamento()" id="btnConfirmar">Confirmar Agendamento</button>

        <p id="mensagem"></p>
    </div>

    <script>
        const SUPABASE_URL = 'https://oivvshvlyvzkfclzpxgx.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9pdnZzaHZseXZ6a2ZjbHpweGd4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTI2NjM5NDMsImV4cCI6MjAyODI0Mzk0M30.4M3NfX08_5pM8J3Y5P9vX0a8Y2e4';
        
        // CORREÇÃO TÉCNICA AQUI
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function atualizarValor() {
            const select = document.getElementById('servico');
            const valorInput = document.getElementById('valor');
            const preco = select.options[select.selectedIndex].getAttribute('data-preco');
            if (preco) {
                valorInput.value = "R$ " + preco.replace('.', ',');
                valorInput.setAttribute('data-raw', preco);
            } else {
                valorInput.value = "R$ 0,00";
            }
        }

        async function salvarAgendamento() {
            const btn = document.getElementById('btnConfirmar');
            const msg = document.getElementById('mensagem');

            const dados = {
                cliente_nome: document.getElementById('cliente_nome').value,
                cliente_sobrenome: document.getElementById('cliente_sobrenome').value,
                contato: document.getElementById('contato').value,
                servico: document.getElementById('servico').value,
                valor: parseFloat(document.getElementById('valor').getAttribute('data-raw') || 0),
                pagamento: document.getElementById('pagamento').value
            };

            if (!dados.cliente_nome || !dados.servico) {
                alert("Preencha nome e serviço!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Salvando...";

            const { data, error } = await _supabase
                .from('lista_agendamentos')
                .insert([dados]);

            if (error) {
                msg.innerText = "Erro: " + error.message;
                msg.style.color = "red";
            } else {
                msg.innerText = "✅ Sucesso!";
                msg.style.color = "green";
                // Limpa os campos
                document.getElementById('cliente_nome').value = "";
                document.getElementById('cliente_sobrenome').value = "";
                document.getElementById('contato').value = "";
                document.getElementById('servico').value = "";
                document.getElementById('valor').value = "R$ 0,00";
            }
            btn.disabled = false;
            btn.innerText = "Confirmar Agendamento";
        }
    </script>
</body>
</html>
