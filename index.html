<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Hair - Agendamento</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --accent: #e19d9d; --bg: #0a0a0a; --card: #161616; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .header { text-align: center; margin-bottom: 40px; margin-top: 20px; }
        .header h1 { font-weight: 300; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; margin: 0; }
        .header p { color: #666; font-size: 14px; margin-top: 5px; }

        .services-container { width: 100%; max-width: 450px; }
        
        .service-card { 
            background: var(--card); 
            border: 1px solid #222; 
            border-radius: 20px; 
            padding: 20px; 
            margin-bottom: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .service-card:active { transform: scale(0.98); }
        
        .service-info h3 { margin: 0; font-size: 18px; font-weight: 500; color: #eee; }
        .service-info p { margin: 5px 0 0; color: var(--accent); font-weight: bold; font-size: 16px; }

        /* CARROSSEL DE PRODUTOS ORIGINAL */
        .carousel-container { width: 100%; max-width: 450px; overflow-x: auto; display: flex; gap: 15px; padding-bottom: 20px; scrollbar-width: none; }
        .carousel-container::-webkit-scrollbar { display: none; }
        
        .product-card { min-width: 150px; background: var(--card); border: 1px solid #222; border-radius: 20px; padding: 10px; text-align: center; }
        .product-card img { width: 100%; height: 120px; border-radius: 15px; object-fit: cover; margin-bottom: 10px; }
        .product-card h4 { margin: 5px 0; font-size: 14px; }
        .product-card span { color: var(--accent); font-weight: bold; }

        .btn-book { background-color: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <h1>BABY HAIR</h1>
        <p>Agendamento Exclusivo</p>
    </div>

    <div class="services-container" id="lista-servicos">
        </div>

    <div style="width: 100%; max-width: 450px; margin-top: 30px;">
        <h3 style="color: var(--accent); font-size: 14px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px;">Mimos & Produtos</h3>
        <div class="carousel-container" id="lista-produtos">
            </div>
    </div>

<script>
    const _supabase = supabase.createClient('https://htraketscvmlaecbvdum.supabase.co', 'sb_publishable_kpTujdxJLja9w0YrfVHqkg_o2VrRgzy');
    const urlParams = new URLSearchParams(window.location.search);
    const SALAO_ID = urlParams.get('salao') || 1;

    async function loadApp() {
        // Carregar Serviços
        const { data: svcs } = await _supabase.from('servicos_cadastrados').select('*').eq('admin_id', SALAO_ID);
        const sCont = document.getElementById('lista-servicos');
        sCont.innerHTML = "";
        svcs?.forEach(s => {
            sCont.innerHTML += `
                <div class="service-card" onclick="fazerAgendamento('${s.nome}', ${s.preco})">
                    <div class="service-info">
                        <h3>${s.nome}</h3>
                        <p>R$ ${s.preco.toFixed(2)}</p>
                    </div>
                    <button class="btn-book">Agendar</button>
                </div>`;
        });

        // Carregar Produtos (Carrossel)
        const { data: prods } = await _supabase.from('produtos_cadastrados').select('*').eq('admin_id', SALAO_ID);
        const pCont = document.getElementById('lista-produtos');
        pCont.innerHTML = "";
        prods?.forEach(p => {
            pCont.innerHTML += `
                <div class="product-card">
                    <img src="${p.imagem_url || 'https://via.placeholder.com/150'}" alt="${p.nome}">
                    <h4>${p.nome}</h4>
                    <span>R$ ${p.preco.toFixed(2)}</span>
                </div>`;
        });
    }

    async function fazerAgendamento(nomeSvc, precoSvc) {
        const cliente = prompt("Seu nome para o agendamento:");
        if(!cliente) return;

        const { error } = await _supabase.from('agendamentos').insert([
            { nome: cliente, servico: nomeSvc, preco: precoSvc, salao_id: SALAO_ID }
        ]);

        if(!error) alert("Agendado com sucesso!");
        else alert("Erro: " + error.message);
    }

    loadApp();
</script>
</body>
</html>
