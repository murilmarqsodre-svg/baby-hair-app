<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Hair - Agendamento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-pink-50 pb-10">

    <header class="bg-white p-6 shadow-sm text-center">
        <h1 class="text-2xl font-bold text-pink-600">Baby Hair</h1>
        <p class="text-gray-500 text-sm">Beleza Feminina e Estilo</p>
    </header>

    <main class="max-w-md mx-auto mt-6 px-4">
        <form id="agendamentoForm" class="space-y-6">
            
            <section class="bg-white p-4 rounded-xl shadow-sm">
                <h2 class="font-semibold text-gray-700 mb-3">1. Selecione o Serviço</h2>
                <select id="servico" class="w-full p-3 border border-pink-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-pink-500" required>
                    <option value="">Escolha um serviço...</option>
                    <option value="120">Corte Feminino - R$ 120,00</option>
                    <option value="70">Escova Modelada - R$ 70,00</option>
                    <option value="450">Mechas/Iluminada - R$ 450,00</option>
                    <option value="75">Manicure e Pedicure - R$ 75,00</option>
                    <option value="45">Design de Sobrancelhas - R$ 45,00</option>
                </select>
            </section>

            <section class="bg-white p-4 rounded-xl shadow-sm">
                <h2 class="font-semibold text-gray-700 mb-3">2. Seus Dados</h2>
                <div class="grid grid-cols-2 gap-2 mb-3">
                    <input type="text" id="nome" placeholder="Nome" class="p-3 border border-gray-200 rounded-lg w-full" required>
                    <input type="text" id="sobrenome" placeholder="Sobrenome" class="p-3 border border-gray-200 rounded-lg w-full" required>
                </div>
                <input type="tel" id="contato" placeholder="WhatsApp (DDD + Número)" class="p-3 border border-gray-200 rounded-lg w-full mb-3" required>
                <textarea id="obs" placeholder="Observações (Opcional)" class="p-3 border border-gray-200 rounded-lg w-full h-20"></textarea>
            </section>

            <section class="bg-white p-4 rounded-xl shadow-sm">
                <h2 class="font-semibold text-gray-700 mb-3">3. Forma de Pagamento</h2>
                <div class="grid grid-cols-2 gap-2">
                    <label class="border p-3 rounded-lg text-center cursor-pointer hover:bg-pink-100 transition">
                        <input type="radio" name="pagamento" value="pix" class="hidden" required> Pix
                    </label>
                    <label class="border p-3 rounded-lg text-center cursor-pointer hover:bg-pink-100 transition">
                        <input type="radio" name="pagamento" value="debito" class="hidden"> Débito
                    </label>
                    <label class="border p-3 rounded-lg text-center cursor-pointer hover:bg-pink-100 transition">
                        <input type="radio" name="pagamento" value="credito" class="hidden"> Crédito
                    </label>
                    <label class="border p-3 rounded-lg text-center cursor-pointer hover:bg-pink-100 transition">
                        <input type="radio" name="pagamento" value="especie" class="hidden"> Espécie
                    </label>
                </div>
            </section>

            <button type="submit" class="w-full bg-pink-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-pink-700 transition">
                Finalizar Agendamento
            </button>
        </form>
    </main>

    <script>
        document.getElementById('agendamentoForm').onsubmit = function(e) {
            e.preventDefault();
            alert('Dados capturados! Próximo passo: Conectar ao Banco de Dados.');
        };
    </script>
</body>
</html>
