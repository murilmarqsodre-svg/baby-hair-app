<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Hair - Agendamento</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --accent: #e19d9d; --bg: #0a0a0a; --card: #161616; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .header { text-align: center; margin-top: 30px; margin-bottom: 20px; }
        .header h1 { font-weight: 300; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; margin: 0; }
        .header p { color: #666; font-size: 14px; }

        .container { width: 100%; max-width: 450px; }
        
        /* Inputs Originais */
        .input-group { margin-bottom: 12px; }
        input, select { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid #222; background: #000; color: #fff; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: var(--accent); }

        .section-title { color: var(--accent); font-size: 11px; text-transform: uppercase; letter-spacing: 2px; margin: 25px 0 12px; border-bottom: 1px solid #222; padding-bottom: 5px; }

        /* Serviços Estilizados */
        .service-card { background: var(--card); border: 1px solid #222; border-radius: 20px; padding: 18px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.3s; }
        .service-card.active { border-color: var(--accent); background: #1f1f1f; }
        .service-info h3 { margin: 0; font-size: 17px; font-weight: 500; }
        .service-info p { margin: 4px 0 0; color: var(--accent); font-weight: bold; }

        /* CARROSSEL DE PRODUTOS RESTAURADO */
        .carousel { display: flex; overflow-x: auto; gap: 15px; padding: 10px 5px 20px; scrollbar-width: none; width: 100%; }
        .carousel::-webkit-scrollbar { display: none; }
        .product-card { min-width: 160px; background: var(--card); border-radius: 20px; padding: 12px; border: 1px solid #222; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .product-card img { width: 100%; height: 130px; border-radius: 15px; object-fit: cover; margin-bottom: 10px; border: 1px solid #333; }
        .product-card h4 { margin: 5px 0; font-size: 14px; font-weight: 400; color: #eee; }
        .product-card span { color: var(--accent); font-weight: bold; font-size: 15px; }

        .btn-confirm { background: var(--accent); color: white; border: none; padding: 20px; border-radius: 18px; width: 100%; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 20px; box-shadow: 0 8px 20px rgba(225, 157, 157, 0.2); transition: 0.3s; }
        .btn-confirm:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="header">
        <h1>BABY HAIR</h1>
        <p>Agendamento Premium</p>
    </div>

    <div class="container">
        <div class="input-group">
            <input type="text" id="input_nome" placeholder="Seu Nome">
        </div>
        <div class="input-group">
            <input type="tel" id="input_zap" placeholder="WhatsApp">
        </div>

        <div class="section-title">Nossos Serviços</div>
        <div id="container_servicos"></div>

        <div class="section-title">Data e Horário</div>
        <div style="display: flex; gap: 10px;">
            <input type="date" id="input_data">
            <input type="time" id="input_hora">
        </div>

        <div class="section-title">Mimos & Produtos</div>
        <div class="carousel" id="container_produtos"></div>

        <button class="btn-confirm" onclick="finalizarAgendamento()">FINALIZAR AGENDAMENTO</button>
    </div>

<script>
    const _supabase = supabase.createClient('https://htraketscvmlaecbvdum.supabase.co', 'sb_publishable_kpTujdxJLja9w0YrfVHqkg_o2VrRgzy');
    const urlParams = new URLSearchParams(window.location.search);
    const SALAO_ID = urlParams.get('salao') || 1;
    let servicoSelecionado = null;

    async function carregarApp() {
        // Buscar Serviços do Banco
        const { data: servicos } = await _supabase.from('servicos_cadastrados').select('*').eq('admin_id', SALAO_ID);
        const sDiv = document.getElementById('container_servicos');
        sDiv.innerHTML = "";
        servicos?.forEach(s => {
            const card = document.createElement('div');
            card.className = 'service-card';
            card.onclick = () => {
                document.querySelectorAll('.service-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                servicoSelecionado = s;
            };
            card.innerHTML = `<div class="service-info"><h3>${s.nome}</h3><p>R$ ${s.preco.toFixed(2)}</p></div><div style="color:var(--accent)">➔</div>`;
            sDiv.appendChild(card);
        });

        // Buscar Produtos para o Carrossel
        const { data: produtos } = await _supabase.from('produtos_cadastrados').select('*').eq('admin_id', SALAO_ID);
        const pDiv = document.getElementById('container_produtos');
        pDiv.innerHTML = "";
        produtos?.forEach(p => {
            pDiv.innerHTML += `
                <div class="product-card">
                    <img src="${p.imagem_url || 'https://via.placeholder.com/150'}">
                    <h4>${p.nome}</h4>
                    <span>R$ ${p.preco.toFixed(2)}</span>
                </div>`;
        });
    }

    async function finalizarAgendamento() {
        const nome = document.getElementById('input_nome').value;
        const zap = document.getElementById('input_zap').value;
        const data = document.getElementById('input_data').value;
        const hora = document.getElementById('input_hora').value;

        if(!nome || !servicoSelecionado || !data || !hora) {
            return alert("Por favor, preencha todos os campos!");
        }

        const { error } = await _supabase.from('agendamentos').insert([{
            nome: nome,
            whatsapp: zap,
            servico: servicoSelecionado.nome,
            preco: servicoSelecionado.preco,
            data_hora: `${data} ${hora}`,
            salao_id: SALAO_ID
        }]);

        if(!error) {
            alert("✅ " + nome + ", seu agendamento foi realizado!");
            location.reload();
        } else {
            alert("Erro técnico: " + error.message);
        }
    }

    carregarApp();
</script>
</body>
</html>
