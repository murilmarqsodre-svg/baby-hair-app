<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Hair Pro - Salão de Beleza</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --accent: #e19d9d; --dark: #1f1f1f; --card: #2d2d2d; --text: #f5f5f5; --bg: #121212; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: var(--card); border-radius: 20px; width: 100%; max-width: 400px; padding: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); border: 1px solid #3d3d3d; }
        h1 { text-align: center; color: var(--accent); font-size: 26px; font-weight: 300; letter-spacing: 3px; margin-bottom: 30px; }
        
        /* Seção Profissionais */
        .section-title { font-size: 13px; color: var(--accent); margin-top: 25px; margin-bottom: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .list-horizontal { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .item-card { min-width: 110px; background: #383838; padding: 15px 10px; border-radius: 15px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: 0.3s; }
        .item-card.selected { border-color: var(--accent); background: #454545; box-shadow: 0 0 10px rgba(225, 157, 157, 0.3); }
        .item-card .avatar { width: 55px; height: 55px; border-radius: 50%; background: var(--accent); margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; color: var(--bg); font-weight: bold; }
        .item-card p { margin: 0; font-size: 13px; font-weight: 500; }

        /* Carrossel de Produtos */
        .product-card { min-width: 140px; background: #383838; border-radius: 12px; padding: 12px; text-align: center; border: 1px solid #444; }
        .product-price { color: var(--accent); font-weight: bold; margin: 8px 0; display: block; }
        .btn-add { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 11px; transition: 0.3s; }
        .btn-add:hover { background: var(--accent); color: var(--bg); }

        /* Estilização de Inputs */
        input, select { width: 100%; padding: 14px; margin-top: 8px; border-radius: 10px; border: 1px solid #444; background: #181818; color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--accent); }

        /* Checkout */
        .checkout-box { background: rgba(0,0,0,0.2); padding: 18px; border-radius: 15px; margin-top: 25px; border: 1px solid var(--accent); }
        .checkout-item { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; opacity: 0.9; }
        .total { border-top: 1px solid #444; padding-top: 12px; font-weight: bold; color: var(--accent); font-size: 20px; }
        
        .btn-confirm { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 17px; margin-top: 25px; cursor: pointer; box-shadow: 0 5px 15px rgba(225, 157, 157, 0.2); }
    </style>
</head>
<body>

<div class="container">
    <h1>Baby Hair</h1>

    <div class="section-title">Selecione a Profissional</div>
    <div class="list-horizontal" id="profissionais">
        <div class="item-card" onclick="selectPro(this, 'Carla Mendes')">
            <div class="avatar">CM</div>
            <p>Carla Mendes</p>
        </div>
        <div class="item-card" onclick="selectPro(this, 'Juliana Souza')">
            <div class="avatar">JS</div>
            <p>Juliana Souza</p>
        </div>
        <div class="item-card" onclick="selectPro(this, 'Ana Beatriz')">
            <div class="avatar">AB</div>
            <p>Ana Beatriz</p>
        </div>
    </div>

    <div class="section-title">Dados da Cliente</div>
    <input type="text" id="cliente_nome" placeholder="Seu nome completo">
    <input type="text" id="contato" placeholder="WhatsApp (DDD)">

    <div class="section-title">Procedimento</div>
    <select id="servico" onchange="updateCheckout()">
        <option value="0">Escolha o serviço...</option>
        <option value="80">Escova & Hidratação - R$ 80,00</option>
        <option value="150">Corte & Coloração - R$ 150,00</option>
        <option value="50">Manicure & Pedicure - R$ 50,00</option>
    </select>

    <div class="section-title">Mimos para seu cabelo</div>
    <div class="list-horizontal">
        <div class="product-card">
            <p>Máscara Repair</p>
            <span class="product-price">R$ 45,00</span>
            <button class="btn-add" onclick="addProduct('Máscara Repair', 45)">Adicionar</button>
        </div>
        <div class="product-card">
            <p>Sérum Finalizador</p>
            <span class="product-price">R$ 32,00</span>
            <button class="btn-add" onclick="addProduct('Sérum', 32)">Adicionar</button>
        </div>
    </div>

    <div class="section-title">Forma de Pagamento</div>
    <select id="pagamento">
        <option value="Pix">Pix</option>
        <option value="Cartão de Crédito">Cartão de Crédito</option>
        <option value="Dinheiro">Dinheiro</option>
    </select>

    <div class="checkout-box">
        <div class="checkout-item"><span>Procedimento:</span> <span id="check-servico">R$ 0,00</span></div>
        <div class="checkout-item"><span>Produtos:</span> <span id="check-produtos">R$ 0,00</span></div>
        <div class="checkout-item total"><span>Total:</span> <span id="check-total">R$ 0,00</span></div>
    </div>

    <button onclick="salvar()" id="btn-confirm" class="btn-confirm">Confirmar Agendamento</button>
    <p id="mensagem" style="text-align:center; margin-top:15px; font-size:14px;"></p>
</div>

<script>
    const SUPABASE_URL = 'https://htraketscvmlaecbvdum.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_kpTujdxJLja9w0YrfVHqkg_o2VrRgzy';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let proSelecionada = "";
    let valorProdutos = 0;
    let listaProdutos = [];

    function selectPro(el, nome) {
        document.querySelectorAll('.item-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        proSelecionada = nome;
    }

    function addProduct(nome, preco) {
        valorProdutos += preco;
        listaProdutos.push(nome);
        updateCheckout();
    }

    function updateCheckout() {
        const servicoPreco = parseFloat(document.getElementById('servico').value);
        document.getElementById('check-servico').innerText = `R$ ${servicoPreco.toFixed(2)}`;
        document.getElementById('check-produtos').innerText = `R$ ${valorProdutos.toFixed(2)}`;
        document.getElementById('check-total').innerText = `R$ ${(servicoPreco + valorProdutos).toFixed(2)}`;
    }

    async function salvar() {
        const btn = document.getElementById('btn-confirm');
        const nome = document.getElementById('cliente_nome').value;
        const zap = document.getElementById('contato').value;
        const servTxt = document.getElementById('servico').options[document.getElementById('servico').selectedIndex].text;
        const formaPag = document.getElementById('pagamento').value;
        const total = document.getElementById('check-total').innerText;

        if (!nome || !proSelecionada || document.getElementById('servico').value == "0") {
            alert("Por favor, preencha todos os campos e selecione a profissional."); return;
        }

        btn.disabled = true; btn.innerText = "Agendando...";

        try {
            const { error } = await _supabase.from('lista_agendamentos').insert([{ 
                cliente_nome: nome, 
                contato: zap, 
                servico: servTxt,
                barbeiro: proSelecionada, // Mantemos o nome da coluna no banco, mas salvamos a profissional aqui
                produtos: listaProdutos.join(", "),
                forma_pagamento: formaPag,
                valor_total: total
            }]);

            if (error) throw error;
            document.getElementById('mensagem').innerText = "✅ Agendamento realizado com sucesso!";
            document.getElementById('mensagem').style.color = "#a8e6cf";
        } catch (e) {
            document.getElementById('mensagem').innerText = "Erro: " + e.message;
            document.getElementById('mensagem').style.color = "#ff8b94";
        } finally {
            btn.disabled = false; btn.innerText = "Confirmar Agendamento";
        }
    }
</script>
</body>
</html>
