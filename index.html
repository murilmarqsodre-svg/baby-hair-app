<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Baby Hair - Agendamento</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #fff0f5;
  margin: 0;
}

header {
  background: #ff69b4;
  color: white;
  padding: 15px;
  text-align: center;
}

.section {
  padding: 15px;
}

button {
  background: #ff69b4;
  color: white;
  border: none;
  padding: 8px;
  border-radius: 5px;
  margin: 3px;
  cursor: pointer;
}

button.selected {
  background: #c2185b;
}

.carousel {
  display: flex;
  overflow-x: auto;
  gap: 10px;
}

.product {
  min-width: 140px;
  text-align: center;
}

.product img {
  width: 100%;
  border-radius: 10px;
}

.checkout {
  background: white;
  padding: 10px;
  border-radius: 10px;
}

.total {
  font-weight: bold;
  font-size: 18px;
  color: #c2185b;
}

input, select {
  padding: 8px;
  width: 100%;
}
</style>
</head>

<body>

<header>
<h2>Baby Hair 💇‍♀️</h2>
<p>Agende seu horário</p>
</header>

<div class="section">
<h3>Serviços</h3>
<div id="services"></div>
</div>

<div class="section">
<h3>Profissionais</h3>
<div id="professionals"></div>
</div>

<div class="section">
<h3>Escolha o dia</h3>
<input type="date" id="date" onchange="dateSelected()">
</div>

<div class="section">
<h3>Horários disponíveis</h3>
<div id="times"></div>
</div>

<div class="section">
<h3>Produtos</h3>
<div class="carousel" id="products"></div>
</div>

<div class="section">
<h3>Resumo do Pedido</h3>
<div class="checkout" id="checkout"></div>
</div>

<div class="section">
<h3>Seus dados</h3>
<input placeholder="Seu nome" id="name"><br><br>
<input placeholder="WhatsApp" id="phone"><br><br>

<select id="payment">
<option>Pix</option>
<option>Cartão</option>
<option>Dinheiro</option>
</select>
<br><br>

<button onclick="finalizar()">Finalizar Agendamento</button>
</div>

<script>

// 🔹 DADOS
const services = [
  { id: 1, name: "Corte", price: 30 },
  { id: 2, name: "Luzes", price: 120 },
  { id: 3, name: "Hidratação", price: 50 }
];

const professionals = [
  { id: 1, name: "Carla", services: [2,3] },
  { id: 2, name: "Ana", services: [1,3] }
];

const times = ["09:00", "10:00", "11:00", "14:00", "15:00"];

const products = [
  { id: 1, name: "Shampoo", price: 25, img: "https://via.placeholder.com/150" },
  { id: 2, name: "Óleo Capilar", price: 40, img: "https://via.placeholder.com/150" }
];

// 🔹 ESTADO
let selectedService = null;
let selectedProfessional = null;
let selectedDate = null;
let selectedTime = null;
let cart = {};

// 🔹 SERVIÇOS
function loadServices() {
  const div = document.getElementById("services");
  div.innerHTML = "";
  services.forEach(s => {
    const btn = document.createElement("button");
    btn.innerText = `${s.name} - R$${s.price}`;
    btn.onclick = () => {
      selectedService = s.id;
      selectedProfessional = null;
      selectedTime = null;
      loadProfessionals();
      updateCheckout();
      highlight(div, btn);
    };
    div.appendChild(btn);
  });
}

// 🔹 PROFISSIONAIS
function loadProfessionals() {
  const div = document.getElementById("professionals");
  div.innerHTML = "";

  const filtered = professionals.filter(p =>
    p.services.includes(selectedService)
  );

  filtered.forEach(p => {
    const btn = document.createElement("button");
    btn.innerText = p.name;
    btn.onclick = () => {
      selectedProfessional = p.id;
      updateCheckout();
      highlight(div, btn);
    };
    div.appendChild(btn);
  });
}

// 🔹 DATA
function dateSelected() {
  selectedDate = document.getElementById("date").value;
  loadTimes();
  updateCheckout();
}

// 🔹 HORÁRIOS
function loadTimes() {
  const div = document.getElementById("times");
  div.innerHTML = "";

  if (!selectedDate || !selectedProfessional) {
    div.innerHTML = "<p>Selecione profissional e data</p>";
    return;
  }

  times.forEach(t => {
    const btn = document.createElement("button");
    btn.innerText = t;
    btn.onclick = () => {
      selectedTime = t;
      updateCheckout();
      highlight(div, btn);
    };
    div.appendChild(btn);
  });
}

// 🔹 PRODUTOS
function loadProducts() {
  const div = document.getElementById("products");

  products.forEach(p => {
    const card = document.createElement("div");
    card.className = "product";

    card.innerHTML = `
      <img src="${p.img}">
      <p>${p.name}</p>
      <p>R$${p.price}</p>
      <button onclick="add(${p.id})">+</button>
      <button onclick="remove(${p.id})">-</button>
    `;

    div.appendChild(card);
  });
}

function add(id) {
  cart[id] = (cart[id] || 0) + 1;
  updateCheckout();
}

function remove(id) {
  if(cart[id]) cart[id]--;
  updateCheckout();
}

// 🔹 CHECKOUT
function updateCheckout() {

  let html = "";
  let total = 0;

  const service = services.find(s => s.id === selectedService);
  const professional = professionals.find(p => p.id === selectedProfessional);

  if (service) {
    html += `<p>Serviço: ${service.name} - R$${service.price}</p>`;
    total += service.price;
  }

  if (professional) {
    html += `<p>Profissional: ${professional.name}</p>`;
  }

  if (selectedDate && selectedTime) {
    html += `<p>Data: ${selectedDate} às ${selectedTime}</p>`;
  }

  let productTotal = 0;

  for (let id in cart) {
    if (cart[id] > 0) {
      const p = products.find(prod => prod.id == id);
      const subtotal = p.price * cart[id];
      productTotal += subtotal;

      html += `<p>${p.name} x${cart[id]} - R$${subtotal}</p>`;
    }
  }

  total += productTotal;

  html += `<hr>`;
  html += `<p>Produtos: R$${productTotal}</p>`;
  html += `<p class="total">Total: R$${total}</p>`;

  document.getElementById("checkout").innerHTML = html;
}

// 🔹 FINALIZAR
function finalizar() {

  if (!selectedService || !selectedProfessional || !selectedDate || !selectedTime) {
    alert("Preencha todas as etapas!");
    return;
  }

  alert("Agendamento concluído!");
}

// 🔹 AUX
function highlight(parent, btn) {
  Array.from(parent.children).forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
}

// INIT
loadServices();
loadProducts();

</script>

</body>
</html>
