<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Hair App</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; padding: 25px; }
        h1 { text-align: center; color: #333; margin-bottom: 20px; font-size: 24px; }
        label { display: block; margin-top: 12px; color: #555; font-size: 14px; font-weight: bold; }
        input, select, button { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { background-color: #28a745; color: white; border: none; cursor: pointer; margin-top: 25px; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #218838; }
        #mensagem { text-align: center; margin-top: 15px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Baby Hair App</h1>

        <label>Seu Nome</label>
        <input type="text" id="cliente_nome" placeholder="Digite seu nome">

        <label>WhatsApp</label>
        <input type="text" id="contato" placeholder="(73) 99999-9999">

        <label>Escolha o Serviço</label>
        <select id="servico">
            <option value="">Selecione...</option>
            <option value="Corte Simples">Corte Simples - R$ 30,00</option>
            <option value="Corte + Barba">Corte + Barba - R$ 50,00</option>
            <option value="Pezinho">Pezinho - R$ 15,00</option>
        </select>

        <button onclick="salvar()" id="btn">Confirmar Agendamento</button>
        <p id="mensagem"></p>
    </div>

    <script>
        // URL E KEY ATUALIZADAS CONFORME SEUS PRINTS
        const SUPABASE_URL = 'https://htraketscvmlaecbvdum.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_kpTujdxJLja9w0YrfVHqkg_o2VrRgzy';
        
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        async function salvar() {
            const btn = document.getElementById('btn');
            const msg = document.getElementById('mensagem');
            
            const nome = document.getElementById('cliente_nome').value;
            const zap = document.getElementById('contato').value;
            const serv = document.getElementById('servico').value;

            if (!nome || !serv) {
                alert("Por favor, preencha o nome e escolha o serviço!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Enviando...";

            try {
                const { error } = await _supabase
                    .from('lista_agendamentos')
                    .insert([{ 
                        cliente_nome: nome, 
                        contato: zap, 
                        servico: serv 
                    }]);

                if (error) throw error;

                msg.innerText = "✅ Agendamento realizado com sucesso!";
                msg.style.color = "green";
                
                // Limpa os campos após o sucesso
                document.getElementById('cliente_nome').value = "";
                document.getElementById('contato').value = "";
                document.getElementById('servico').value = "";

            } catch (err) {
                console.error("Erro detalhado:", err);
                msg.innerText = "Erro ao salvar: " + err.message;
                msg.style.color = "red";
            } finally {
                btn.disabled = false;
                btn.innerText = "Confirmar Agendamento";
            }
        }
    </script>
</body>
</html>
