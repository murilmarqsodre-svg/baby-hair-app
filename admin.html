<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Admin - Oficial</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root { --accent: #e19d9d; --bg: #0a0a0a; --card: #161616; --text: #ffffff; }
body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 90px; }
.header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid #222; }
.container { padding: 15px; max-width: 600px; margin: auto; }
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.stat-card { background: var(--card); padding: 18px; border-radius: 15px; border: 1px solid #222; text-align: center; }
.stat-card h3 { color: var(--accent); margin: 0; }
.btn-primary { background: var(--accent); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; }
.tab-bar { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #222; }
.hidden { display: none; }
select { width:100%; padding:10px; margin-bottom:15px; border-radius:10px; border:none; }
</style>
</head>

<body id="admin-body" class="hidden">

<div class="header">
    <h2 style="color: var(--accent); margin:0;">Baby Admin</h2>
    <button onclick="copyClientLink()" style="background:#25d366;color:white;border:none;padding:8px 14px;border-radius:20px;">🔗 LINK</button>
</div>

<div class="container">

<!-- FILTRO -->
<select id="filtroMes" onchange="filtrarMes()"></select>

<div class="stats-grid">
    <div class="stat-card">
        <h3 id="ganhos">R$ 0,00</h3>
        <p>Receita do mês</p>
    </div>
    <div class="stat-card">
        <h3 id="agenda-count">0</h3>
        <p>Agendamentos</p>
    </div>
</div>

<canvas id="chartMobile" height="200" style="margin-top:20px;"></canvas>

</div>

<div class="tab-bar">
    <div>📊<br>Dashboard</div>
</div>

<script>

const _supabase = supabase.createClient(
'https://htraketscvmlaecbvdum.supabase.co',
'sb_publishable_kpTujdxJLja9w0YrfVHqkg_o2VrRgzy'
);

// LOGIN
if(prompt("Senha:") === "1234"){
 document.getElementById('admin-body').classList.remove('hidden');
 carregarMeses();
}else{
 location.href="index.html";
}

// 🔹 CARREGAR MESES DISPONÍVEIS
async function carregarMeses(){

 const { data } = await _supabase.from('lista_agendamentos').select('data_agendamento');

 const select = document.getElementById("filtroMes");
 const meses = new Set();

 data.forEach(d=>{
   const mes = d.data_agendamento.slice(0,7);
   meses.add(mes);
 });

 select.innerHTML = "";

 [...meses].sort().reverse().forEach(m=>{
   const opt = document.createElement("option");
   opt.value = m;
   opt.text = m;
   select.appendChild(opt);
 });

 filtrarMes();
}

// 🔹 FILTRO PRINCIPAL
async function filtrarMes(){

 const mes = document.getElementById("filtroMes").value;

 const { data } = await _supabase
   .from('lista_agendamentos')
   .select('*')
   .like('data_agendamento', mes + '%');

 if(!data) return;

 const total = data.reduce((sum,i)=>sum+(i.valor_total_num||0),0);

 document.getElementById("ganhos").innerText = "R$ " + total.toFixed(2);
 document.getElementById("agenda-count").innerText = data.length;

 gerarGrafico(data);
}

// 🔹 GRÁFICO POR DIA
function gerarGrafico(data){

 const porDia = {};

 data.forEach(i=>{
   const dia = i.data_agendamento.split("-")[2];

   if(!porDia[dia]) porDia[dia]=0;
   porDia[dia]+= (i.valor_total_num||0);
 });

 const labels = Object.keys(porDia);
 const valores = Object.values(porDia);

 const ctx = document.getElementById('chartMobile');

 if(window.chart) window.chart.destroy();

 window.chart = new Chart(ctx,{
   type:'bar',
   data:{
     labels:labels,
     datasets:[{ label:'R$', data:valores }]
   }
 });
}

// LINK
function copyClientLink(){
 navigator.clipboard.writeText("https://baby-hair-app.vercel.app/");
 alert("Link copiado!");
}

</script>

</body>
</html>
