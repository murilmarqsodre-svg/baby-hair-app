<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Hair - Dashboard Profissional</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --accent: #e19d9d; --bg: #0f0f0f; --card: #1a1a1a; --text: #f5f5f5; }
        body { font-family: 'Inter', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; }
        
        /* Sidebar Estilizada */
        .sidebar { width: 260px; height: 100vh; background: var(--card); border-right: 1px solid #333; padding: 25px; box-sizing: border-box; position: fixed; display: flex; flex-direction: column; }
        .sidebar h2 { color: var(--accent); font-weight: 300; letter-spacing: 2px; text-align: center; margin-bottom: 40px; }
        .nav-item { padding: 15px; cursor: pointer; border-radius: 12px; margin-bottom: 8px; transition: 0.3s; display: flex; align-items: center; gap: 10px; color: #aaa; }
        .nav-item:hover, .nav-item.active { background: var(--accent); color: var(--bg); font-weight: bold; }
        
        /* Área de Conteúdo */
        .main { margin-left: 260px; padding: 40px; width: 100%; box-sizing: border-box; }
        .section { display: none; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Dashboard Cards */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; text-align: center; }
        .stat-card h3 { color: var(--accent); margin: 0; font-size: 28px; }
        .stat-card p { margin: 5px 0 0; color: #888; }

        /* Formulários Modernos */
        .form-container { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .form-box { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333; }
        h3 { margin-top: 0; font-weight: 400; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #444; background: #111; color: white; box-sizing: border-box; }
        .btn-save { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }
        
        /* Botão WhatsApp */
        .whatsapp-box { margin-top: auto; padding-top: 20px; border-top: 1px solid #333; }
        .btn-link-fixo { background: #25d366; color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Baby Admin</h2>
    <div class="nav-item active" onclick="showTab(this, 'dash')">📊 Dashboard</div>
    <div class="nav-item" onclick="showTab(this, 'finance')">💰 Financeiro</div>
    <div class="nav-item" onclick="showTab(this, 'manage')">🛠️ Cadastros</div>
    
    <div class="whatsapp-box">
        <p style="font-size: 10px; color: #666; text-transform: uppercase; margin-bottom: 8px;">Compartilhar Salão:</p>
        <button class="btn-link-fixo" onclick="copyMyLink()">🔗 Copiar Link Cliente</button>
    </div>
</div>

<div class="main">
    <div id="dash" class="section active">
        <h1>Olá, Murilo!</h1>
        <div class="stats-grid">
            <div class="stat-card"><h3>R$ 0,00</h3><p>Vendas (Hoje)</p></div>
            <div class="stat-card"><h3>0</h3><p>Agendamentos</p></div>
            <div class="stat-card"><h3>0</h3><p>Mimos Vendidos</p></div>
        </div>
        <div style="background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333;">
            <canvas id="mainChart" height="300"></canvas>
        </div>
    </div>

    <div id="finance" class="section">
        <h1>Financeiro</h1>
        <div style="background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #333;">
            <canvas id="financeChart" height="300"></canvas>
        </div>
    </div>

    <div id="manage" class="section">
        <h1>Gestão do Salão</h1>
        <div class="form-container">
            <div class="form-box">
                <h3>+ Adicionar Serviço</h3>
                <input type="text" id="svc-nome" placeholder="Nome do Serviço">
                <input type="number" id="svc-preco" placeholder="Preço (R$)">
                <button class="btn-save" onclick="saveService()">Salvar Serviço</button>
            </div>
            <div class="form-box">
                <h3>+ Adicionar Mimo (Produto)</h3>
                <input type="text" id="prod-nome" placeholder="Nome do Produto">
                <input type="number" id="prod-preco" placeholder="Preço (R$)">
                <input type="text" id="prod-img" placeholder="URL da Imagem">
                <button class="btn-save" onclick="saveProduct()">Salvar na Vitrine</button>
            </div>
        </div>
    </div>
</div>

<script>
    // Configurações do Murilo
    const SUPABASE_URL = 'https://htraketscvmlaecbvdum.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_kpTujdxJLja9w0YrfVHqkg_o2VrRgzy';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    // O SEU ID É 1
    const MEU_ID = 1;

    function showTab(btn, sectionId) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(sectionId).classList.add('active');
        btn.classList.add('active');
    }

    async function saveService() {
        const nome = document.getElementById('svc-nome').value;
        const preco = document.getElementById('svc-preco').value;
        if(!nome || !preco) return alert("Ei, preencha os campos!");

        const { error } = await _supabase.from('servicos_cadastrados').insert([
            { nome: nome, preco: parseFloat(preco), admin_id: MEU_ID }
        ]);

        if(!error) { 
            alert("Serviço '" + nome + "' salvo!"); 
            location.reload(); 
        } else { alert("Erro: " + error.message); }
    }

    async function saveProduct() {
        const nome = document.getElementById('prod-nome').value;
        const preco = document.getElementById('prod-preco').value;
        const img = document.getElementById('prod-img').value;
        if(!nome || !preco) return alert("Preencha o nome e preço!");

        const { error } = await _supabase.from('produtos_cadastrados').insert([
            { nome: nome, preco: parseFloat(preco), imagem_url: img, admin_id: MEU_ID }
        ]);

        if(!error) { 
            alert("Produto '" + nome + "' adicionado!"); 
            location.reload(); 
        } else { alert("Erro: " + error.message); }
    }

    function copyMyLink() {
        // Pega o endereço atual (GitHub) e gera o link da cliente
        const baseUrl = window.location.href.replace('admin.html', 'index.html');
        const finalLink = `${baseUrl}?salao=${MEU_ID}`;
        
        navigator.clipboard.writeText(finalLink);
        alert("Link da Cliente copiado!\n" + finalLink);
    }

    // Inicialização dos Gráficos
    window.onload = () => {
        const ctxDash = document.getElementById('mainChart').getContext('2d');
        new Chart(ctxDash, {
            type: 'line',
            data: {
                labels: ['Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'],
                datasets: [{
                    label: 'Movimento',
                    data: [5, 12, 8, 20, 15, 25],
                    borderColor: '#e19d9d',
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(225, 157, 157, 0.1)'
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    };
</script>
</body>
</html>
